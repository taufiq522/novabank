<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaBank Chaos Mode</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f172a;
  color:white;
  text-align:center;
}

.container{
  max-width:400px;
  margin:auto;
  padding:20px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  margin-top:15px;
}

.balance{
  font-size:30px;
  margin:10px 0;
}

button{
  padding:10px;
  width:100%;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  margin-top:10px;
}

#notif{
  position:fixed;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  background:#22c55e;
  color:black;
  padding:10px 20px;
  border-radius:20px;
  display:none;
  font-weight:bold;
}
</style>
</head>

<body>

<div id="notif">EVENT</div>

<div class="container">

<h2>🏦 NovaBank Chaos Mode</h2>
<div style="font-size:12px;opacity:0.6;">Simulation Game</div>

<div class="card">
  <div>Balance</div>
  <div class="balance" id="saldo">$50,000</div>
</div>

<div class="card">
  <button onclick="start()">START AUTO EVENT</button>
</div>

</div>

<script>
let saldo = 50000;
let running = false;

function update(){
  document.getElementById("saldo").innerText =
    "$" + Math.floor(saldo).toLocaleString();
}

function notif(text){
  let n = document.getElementById("notif");
  n.innerText = text;
  n.style.display = "block";
  setTimeout(()=> n.style.display="none",2000);
}

function randomEvent(){
  let r = Math.random();

  if(r < 0.25){
    let bonus = Math.random()*3000;
    saldo += bonus;
    notif("💸 BONUS +$"+Math.floor(bonus));
  }
  else if(r < 0.5){
    let loss = Math.random()*2000;
    saldo -= loss;
    notif("💀 HACKER -$"+Math.floor(loss));
  }
  else if(r < 0.75){
    saldo *= 1.2;
    notif("🚀 PROFIT BOOST x1.2");
  }
  else{
    notif("⚠️ SYSTEM ERROR...");
  }

  if(saldo < 0) saldo = 0;

  update();
}

function start(){
  if(running) return;
  running = true;

  notif("SYSTEM STARTED 🔥");

  setInterval(()=>{
    randomEvent();
  }, 4000);
}

update();
</script>

</body>
</html>
