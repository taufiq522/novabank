<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaPay X</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#0b1220;
  color:white;
}

.container{
  max-width:420px;
  margin:auto;
  padding:20px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-size:22px;
  font-weight:bold;
}

.badge{
  font-size:12px;
  opacity:0.6;
}

.card{
  background:linear-gradient(135deg,#1e293b,#0f172a);
  padding:20px;
  border-radius:20px;
  margin-top:15px;
  box-shadow:0 0 25px rgba(0,0,0,0.5);
}

.balance{
  font-size:34px;
  margin-top:10px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  margin-top:10px;
  background:linear-gradient(90deg,#22c55e,#4ade80);
  color:white;
  font-weight:bold;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

#notif{
  position:fixed;
  top:15px;
  left:50%;
  transform:translateX(-50%);
  background:#22c55e;
  color:black;
  padding:10px 20px;
  border-radius:20px;
  display:none;
}

.loader{
  display:none;
  margin-top:10px;
  font-size:14px;
}

.log{
  font-size:14px;
  margin-top:5px;
}

.chart{
  height:80px;
  background:linear-gradient(90deg,#22c55e,#4ade80);
  border-radius:10px;
  margin-top:10px;
  animation:move 2s infinite alternate;
}

@keyframes move{
  from{transform:scaleX(0.9)}
  to{transform:scaleX(1)}
}
</style>
</head>

<body>

<div id="notif"></div>

<div class="container">

<div class="header">
  <div class="logo">💳 NovaPay X</div>
  <div class="badge">Simulation</div>
</div>

<div class="card">
  <div>Balance</div>
  <div class="balance" id="saldo">$120,000</div>
  <div class="chart"></div>
</div>

<div class="card">
  <div>Send Payment</div>
  <input id="user" placeholder="Email or Username">
  <input id="amount" type="number" placeholder="Amount USD">
  <button onclick="send()">Send Now</button>
  <div class="loader" id="loading">⏳ Processing...</div>
</div>

<div class="card">
  <div>Activity</div>
  <div id="log"></div>
</div>

</div>

<script>
let saldo = 120000;

function update(){
  document.getElementById("saldo").innerText =
    "$" + Math.floor(saldo).toLocaleString();
}

function notif(text){
  let n = document.getElementById("notif");
  n.innerText = text;
  n.style.display="block";
  setTimeout(()=>n.style.display="none",2000);
}

function send(){
  let user = document.getElementById("user").value;
  let amount = parseFloat(document.getElementById("amount").value);

  if(!user || !amount){
    alert("Lengkapi data");
    return;
  }

  document.getElementById("loading").style.display="block";

  setTimeout(()=>{
    saldo -= amount;
    update();
    notif("Payment Sent 💸");

    let log = document.getElementById("log");
    log.innerHTML = `<div class="log">Sent $${amount} to ${user}</div>` + log.innerHTML;

    document.getElementById("loading").style.display="none";
  },1500);
}

// auto movement
setInterval(()=>{
  saldo += Math.random()*300;
  update();
},3000);

update();
</script>

</body>
</html>
