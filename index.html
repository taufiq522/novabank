<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaPay Ultimate</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0b1220;
  color:white;
}

.screen{
  display:none;
  padding:20px;
}

.active{
  display:block;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:20px;
  margin-top:15px;
}

.balance{
  font-size:28px;
}

.nav{
  position:fixed;
  bottom:0;
  width:100%;
  max-width:420px;
  left:50%;
  transform:translateX(-50%);
  background:#1e293b;
  display:flex;
  justify-content:space-around;
  padding:10px;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

#notif{
  position:fixed;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  background:#22c55e;
  color:black;
  padding:10px 20px;
  border-radius:20px;
  display:none;
}
</style>
</head>

<body>

<div id="notif"></div>

<!-- LOGIN -->
<div id="login" class="screen active">
  <h2>🔐 NovaPay</h2>
  <input type="password" id="pin" placeholder="Enter PIN (1234)">
  <button onclick="login()">Login</button>
</div>

<!-- HOME -->
<div id="home" class="screen">
  <h3>🏠 Dashboard</h3>

  <div class="card">
    Balance
    <div class="balance" id="saldo">$300,000</div>
  </div>

  <div class="card">
    Send Money
    <input id="user" placeholder="Username">
    <input id="amount" type="number" placeholder="Amount">
    <button onclick="send()">Send</button>
  </div>
</div>

<!-- ACTIVITY -->
<div id="activity" class="screen">
  <h3>📊 Activity</h3>
  <div id="log"></div>
</div>

<!-- CARD -->
<div id="card" class="screen">
  <h3>💳 Card</h3>
  <div class="card">
    **** **** 7788 <br>
    Valid 12/30
  </div>
</div>

<!-- SETTINGS -->
<div id="settings" class="screen">
  <h3>⚙️ Settings</h3>
  <div class="card">Dark Mode ✔</div>
</div>

<div class="nav">
  <div onclick="show('home')">🏠</div>
  <div onclick="show('activity')">📊</div>
  <div onclick="show('card')">💳</div>
  <div onclick="show('settings')">⚙️</div>
</div>

<script>
let saldo = 300000;

function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function login(){
  let pin = document.getElementById("pin").value;
  if(pin==="1234"){
    show("home");
  } else {
    alert("PIN salah");
  }
}

function notif(text){
  let n=document.getElementById("notif");
  n.innerText=text;
  n.style.display="block";
  setTimeout(()=>n.style.display="none",2000);
}

function send(){
  let user=document.getElementById("user").value;
  let amount=parseFloat(document.getElementById("amount").value);

  if(!user || !amount){
    alert("Isi dulu");
    return;
  }

  notif("Processing...");
  setTimeout(()=>{
    saldo -= amount;
    document.getElementById("saldo").innerText="$"+saldo.toLocaleString();
    notif("Transfer Success 💸");

    let log=document.getElementById("log");
    log.innerHTML = `<div>Sent $${amount} to ${user}</div>` + log.innerHTML;
  },1500);
}

// auto uang masuk biar hidup
setInterval(()=>{
  let masuk = Math.random()*1000;
  saldo += masuk;
  document.getElementById("saldo").innerText="$"+saldo.toLocaleString();
  notif("💰 Incoming +$"+Math.floor(masuk));
},5000);
</script>

</body>
</html>
