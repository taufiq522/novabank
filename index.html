<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaPay Elite</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#0f172a;
  color:white;
}

.container{
  max-width:420px;
  margin:auto;
  padding:20px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.card{
  background:linear-gradient(135deg,#1e293b,#334155);
  padding:20px;
  border-radius:20px;
  margin-top:15px;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.balance{
  font-size:32px;
  margin-top:10px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  margin-top:10px;
  background:#22c55e;
  color:white;
  font-weight:bold;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

#notif{
  position:fixed;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  background:#22c55e;
  color:black;
  padding:10px 20px;
  border-radius:20px;
  display:none;
}

.small{
  font-size:12px;
  opacity:0.6;
}

.log{
  font-size:14px;
  margin-top:5px;
}
</style>
</head>

<body>

<div id="notif"></div>

<div class="container">

<div class="header">
  <h2>💳 NovaPay Elite</h2>
  <div class="small">Demo Mode</div>
</div>

<div class="card">
  <div>Balance</div>
  <div class="balance" id="saldo">$75,000</div>
</div>

<div class="card">
  <div>Transfer</div>
  <input id="user" placeholder="Username">
  <input id="amount" type="number" placeholder="Amount USD">
  <button onclick="send()">Send Money</button>
</div>

<div class="card">
  <div>Virtual Card</div>
  <div>**** **** **** 8821</div>
  <div class="small">Valid Thru 12/30</div>
</div>

<div class="card">
  <div>Activity</div>
  <div id="log"></div>
</div>

</div>

<script>
let saldo = 75000;

function update(){
  document.getElementById("saldo").innerText =
    "$" + Math.floor(saldo).toLocaleString();
}

function notif(text){
  let n = document.getElementById("notif");
  n.innerText = text;
  n.style.display="block";
  setTimeout(()=>n.style.display="none",2000);
}

function send(){
  let user = document.getElementById("user").value;
  let amount = parseFloat(document.getElementById("amount").value);

  if(!user || !amount){
    alert("Isi data dulu");
    return;
  }

  saldo -= amount;
  update();

  notif("Transfer Success 💸");

  let log = document.getElementById("log");
  log.innerHTML = `<div class="log">Sent $${amount} to ${user}</div>` + log.innerHTML;
}

// auto saldo naik biar hidup
setInterval(()=>{
  saldo += Math.random()*200;
  update();
},3000);

update();
</script>

</body>
</html>
