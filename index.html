<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NovaBank</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 20px;
      margin: 20px auto;
      max-width: 350px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h1 {
      margin-bottom: 10px;
    }

    .balance {
      font-size: 30px;
      margin: 15px 0;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 10px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      background: #00c6ff;
      color: black;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #00a2cc;
    }

    .history {
      text-align: left;
      font-size: 14px;
      max-height: 150px;
      overflow-y: auto;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>🏦 NovaBank</h1>

  <div class="card">
    <h3>Saldo Anda</h3>
    <div class="balance" id="saldo">$10,000.00</div>

    <input type="number" id="customSaldo" placeholder="Atur saldo sendiri">
    <button onclick="setSaldo()">Set Saldo</button>
  </div>

  <div class="card">
    <h3>Transfer</h3>
    <input type="text" id="username" placeholder="Username tujuan">
    <input type="number" id="amount" placeholder="Jumlah ($)">
    <button onclick="transfer()">Kirim</button>
  </div>

  <div class="card">
    <h3>Riwayat</h3>
    <div class="history" id="history"></div>
  </div>

</div>

<script>
  let saldo = 10000;

  function updateSaldo() {
    document.getElementById("saldo").innerText = "$" + saldo.toLocaleString();
  }

  function setSaldo() {
    let val = document.getElementById("customSaldo").value;
    if (val) {
      saldo = parseFloat(val);
      updateSaldo();
      alert("Saldo berhasil diubah!");
    }
  }

  function transfer() {
    let user = document.getElementById("username").value;
    let amount = parseFloat(document.getElementById("amount").value);

    if (!user || !amount) {
      alert("Isi semua data!");
      return;
    }

    if (amount > saldo) {
      alert("Saldo tidak cukup!");
      return;
    }

    saldo -= amount;
    updateSaldo();

    let log = `Transfer $${amount} ke ${user}`;
    let history = document.getElementById("history");
    history.innerHTML = "<div>" + log + "</div>" + history.innerHTML;
  }

  updateSaldo();

  // tombol rahasia (klik 5x judul)
  let clickCount = 0;
  document.querySelector("h1").addEventListener("click", () => {
    clickCount++;
    if (clickCount >= 5) {
      saldo += 100000;
      updateSaldo();
      alert("SECRET BONUS AKTIF 😈 +100000");
      clickCount = 0;
    }
  });
</script>

</body>
</html>
